<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>joycewu.xyz</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-title">
    <h1>joyce wu</h1>
  </header>

  <main class="gallery">

    <img src="https://picsum.photos/900/1200?random=1" class="gallery-image image-1" alt="" />
    <img src="https://picsum.photos/1400/900?random=2" class="gallery-image image-2" alt="" />
    <img src="https://picsum.photos/1000/1400?random=3" class="gallery-image image-3" alt="" />
    <img src="https://picsum.photos/1600/1000?random=4" class="gallery-image image-4" alt="" />
    <img src="https://picsum.photos/900/1300?random=5" class="gallery-image image-5" alt="" />
    <img src="https://picsum.photos/1500/1000?random=6" class="gallery-image image-6" alt="" />
    <img src="https://picsum.photos/1200/1500?random=7" class="gallery-image image-7" alt="" />
    <video
      class="gallery-video image-8"
      muted
      autoplay
      loop
      playsinline
    >
      <source src="images/whiplash_zine.mp4" type="video/mp4" />
    </video>
    <img
      src="images/cross_sections_canal_trail.png"
      class="gallery-image image-9 vertical-image"
      alt=""
    />
    <img src="https://picsum.photos/1600/900?random=10" class="gallery-image image-10" alt="" />
    <video
      class="gallery-video image-11"
      muted
      autoplay
      loop
      playsinline
    >
      <source src="images/cleanliness_as_god.mp4" type="video/mp4" />
    </video>
    <img src="https://picsum.photos/1500/1000?random=12" class="gallery-image image-12" alt="" />

  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
  
    <span class="close-button" id="closeButton">&times;</span>
  
    <img
      class="lightbox-image"
      id="lightboxImage"
      src=""
      alt=""
    />
  
    <video
      class="lightbox-video"
      id="lightboxVideo"
      controls
      autoplay
      playsinline
    ></video>
  
  </div>

  <script src="script.js"></script>

</body>
</html>
