<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>joycewu.xyz</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-title">
    <h1>joyce wu</h1>
  </header>

  <main class="gallery">

    <img
      src="images/linocut_beach.png"
      class="gallery-image image-1"
      data-title="A Day at the Beach, linocut, 2025"
      alt=""
    />
    <img
      src="images/rooftop.png"
      class="gallery-image image-2"
      data-title="Roof Infrastruture, aquatint etching, 2025"
      alt=""
    />
    <video
      class="gallery-video no-rotate-lightbox image-3"
      data-title="Visual Anthology for the Farmington Canal Trail, 2022"
      muted
      autoplay
      loop
      playsinline
    >
      <source src="images/visual_anthology_video.mp4" type="video/mp4" />
    </video>
    <img
      src="images/senior_thesis_1.jpeg"
      class="gallery-image image-4"
      data-title="Senior thesis installation: 3.8 Stars, 2022"
      alt=""
    />
    <img
      src="images/manhole_cover.gif"
      class="gallery-image image-5"
      data-title="Mapping Manhole Covers in New Haven, CT, 2022"
      alt=""
    />
    <div class="triple-row">
      <img
        src="images/fruit_net.png"
        class="triple-image"
        data-title="3.8 Stars: Fruit Net, collagraph, 2021"
        alt=""
      />
      <img
        src="images/panels_bar_graph.png"
        class="triple-image"
        data-title="3.8 Stars: Data Visualization of Topics in Google Reviews, 2021"
        alt=""
      />
      <img
        src="images/cardboard.png"
        class="triple-image"
        data-title="3.8 Stars: Cardboard Data Visualization of Star Ratings, collagraph, 2021"
        alt=""
      />
      </div>
    <img
      src="images/tracing_hong_kong_market_goods.png"
      class="gallery-image image-6"
      data-title="Tracing Product Lifecycles of Hong Kong Market Goods, 2022"
      alt=""
    />
    <img
      src="images/senior_thesis_2.jpeg"
      class="gallery-image image-7"
      data-title="Senior thesis installation: 3.8 Stars, 2022"
      alt=""
    />
    <video
      class="gallery-video image-8"
      data-title="Whiplash, zine, 2019"
      muted
      autoplay
      loop
      playsinline
    >
      <source src="images/whiplash_zine.mp4" type="video/mp4" />
    </video>
    <img
      src="images/cross_sections_canal_trail.png"
      class="gallery-image image-9 vertical-image"
      data-title="Cross sections of Farmington Canal Trail, 2022"
      alt=""
    />
    <img
      src="images/dining_table.png"
      class="gallery-image image-10"
      data-title="Saturday Morning, aquatint and etching, 2026"
      alt=""
    />
    <video
      class="gallery-video image-11"
      data-title="Cleanliness as God, risograph zine, 2021"
      muted
      autoplay
      loop
      playsinline
    >
      <source src="images/cleanliness_as_god.mp4" type="video/mp4" />
    </video>
    <img
      src="images/senior_thesis_3.jpeg"
      class="gallery-image image-12"
      data-title="Senior thesis installation: 3.8 Stars, 2022"
      alt=""
    />
    <img
      src="images/park.png"
      class="gallery-image image-13"
      data-title="Climbing up the Flagpole, aquatint, 2025"
      alt=""
    />

  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <span class="close-button" id="closeButton">&times;</span>
    <div class="lightbox-content">
      <img
        class="lightbox-image"
        id="lightboxImage"
        src=""
        alt=""
      />
  
      <video
        class="lightbox-video"
        id="lightboxVideo"
        controls
        autoplay
        playsinline
      ></video>
  
      <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
